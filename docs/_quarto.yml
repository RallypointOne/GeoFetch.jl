project:
  type: book
  output-dir: _site

engine: julia
julia:
  project: "."
  exeflags: ["--threads=auto"]

execute:
  timeout: 900

book:
  title: "GeoDataAccess.jl"
  search:
    location: sidebar
    keyboard-shortcut:
      - "/"
  navbar:
    logo: https://github.com/user-attachments/assets/f7216152-0d6e-4459-8e65-b9ed59421638
    logo-href: https://rallypoint1.com
    right:
      - icon: star
        href: https://github.com/RallypointOne/GeoDataAccess.jl/stargazers
        text: "Star"
      - icon: github
        href: https://github.com/RallypointOne/GeoDataAccess.jl
  sidebar:
    collapse-level: 1
  chapters:
    - part: "Docs"
      chapters:
        - index.qmd
        - getting-started.qmd
        - caching.qmd
    - part: "Data Sources"
      chapters:
        - sources/open_meteo_archive.qmd
        - sources/open_meteo_forecast.qmd
        - sources/noaa_ncei.qmd
        - sources/nasa_power.qmd
        - sources/tomorrow_io.qmd
        - sources/visual_crossing.qmd
        - sources/usgs_earthquake.qmd
        - sources/usgs_waterservices.qmd
        - sources/openaq.qmd
        - sources/nasa_firms.qmd
        - sources/epa_aqs.qmd
        - sources/landfire.qmd
        - sources/noaa_gfs.qmd
        - sources/era5.qmd
        - sources/copernicus_dem.qmd
    - part: "API"
      chapters:
        - api.qmd
    - part: "Resources"
      chapters:
        - resources/changelog.qmd
        - resources/coverage.qmd

  page-footer:
    center: "Built on __BUILD_DATE__"

language:
  search-text-placeholder: "Search  (/)"

format:
  html:
    css: styles.css
    number-sections: false
    theme:
      - flatly
      - theme.scss
    include-after-body:
      - file: _version-selector.html
